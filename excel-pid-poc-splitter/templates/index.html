<!DOCTYPE html>
<html>

<head>

<title>Excel PID-POC Splitter</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:400px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

button{
padding:12px 25px;
border:none;
background:#4facfe;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2f8df5;
}

</style>

</head>

<body>

<div class="container">

<h2>Excel PID-POC Splitter</h2>

<input type="file" id="file">

<br><br>

<button onclick="uploadFile()">Generate Files</button>

<p id="status"></p>

</div>

<script>

async function uploadFile(){

const file = document.getElementById("file").files[0]

if(!file){
alert("Please select a file")
return
}

document.getElementById("status").innerText="Processing file..."

const formData = new FormData()

formData.append("file",file)

const response = await fetch("https://YOUR-RENDER-URL.onrender.com/upload",{
method:"POST",
body:formData
})

if(!response.ok){
document.getElementById("status").innerText="Error processing file"
return
}

const blob = await response.blob()

const link=document.createElement("a")

link.href=window.URL.createObjectURL(blob)

link.download="split_files.zip"

link.click()

document.getElementById("status").innerText="Download started"

}

</script>

</body>

</html>
