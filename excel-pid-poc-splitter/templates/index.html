<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Excel PID-POC Splitter</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    width:420px;
    text-align:center;
}

h1{
    margin-bottom:10px;
}

p{
    color:#555;
    margin-bottom:25px;
}

.upload-box{
    border:2px dashed #4facfe;
    border-radius:10px;
    padding:30px;
    margin-bottom:20px;
    transition:0.3s;
}

.upload-box:hover{
    background:#f4faff;
}

input[type="file"]{
    margin-top:10px;
}

button{
    background:#4facfe;
    border:none;
    color:white;
    padding:12px 25px;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#2f8df5;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#888;
}

</style>

</head>

<body>

<div class="container">

<h1>Excel PID-POC Splitter</h1>

<p>Upload your Excel file and automatically generate PID-POC split files.</p>

<form action="/upload" method="post" enctype="multipart/form-data">

<div class="upload-box">

<label>Select Excel File</label><br>
<input type="file" name="file" required>

</div>

<button type="submit">Generate Files</button>

</form>

<div class="footer">
Supports .xls and .xlsx files
</div>

</div>

</body>

</html>
