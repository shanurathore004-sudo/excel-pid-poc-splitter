<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Excel PID-POC Splitter</title>

<!-- Excel Library -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<!-- Zip Library -->
<script src="https://cdn.jsdelivr.net/npm/jszip/dist/jszip.min.js"></script>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:400px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
margin-bottom:20px;
}

input{
padding:10px;
border:1px solid #ddd;
border-radius:6px;
width:100%;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
background:#4facfe;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
width:100%;
}

button:hover{
background:#2f8df5;
}

#status{
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Excel PID-POC Splitter</h2>

<input type="file" id="fileInput">

<button onclick="processFile()">Generate Files</button>

<p id="status"></p>

</div>

<script>

async function processFile(){

const fileInput=document.getElementById("fileInput")

if(fileInput.files.length===0){
alert("Please upload an Excel file")
return
}

document.getElementById("status").innerText="Processing..."

const file=fileInput.files[0]

const data=await file.arrayBuffer()

const workbook=XLSX.read(data)

const sheet=workbook.Sheets[workbook.SheetNames[0]]

const rows=XLSX.utils.sheet_to_json(sheet)

let groups={}

rows.forEach(row=>{

const pid=row.PID
const poc=row.POC

const key=pid+"_"+poc

if(!groups[key]){
groups[key]=[]
}

groups[key].push(row)

})

const zip=new JSZip()

for(const key in groups){

const ws=XLSX.utils.json_to_sheet(groups[key])

const wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Sheet1")

const excelData=XLSX.write(wb,{
bookType:"xlsx",
type:"array"
})

zip.file(key+".xlsx",excelData)

}

const content=await zip.generateAsync({type:"blob"})

const link=document.createElement("a")

link.href=URL.createObjectURL(content)

link.download="split_files.zip"

link.click()

document.getElementById("status").innerText="Download Ready"

}

</script>

</body>
</html>
